# ============================================
# Smart Resume Analyzer - Application Config
# ============================================

# Server
server.port=${PORT:8080}

# MongoDB Configuration
# For local development, use: mongodb://localhost:27017/resumeanalyzer
# For production (Render), set MONGODB_URI environment variable
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/resumeanalyzer}
spring.data.mongodb.database=resumeanalyzer

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.resumeanalyzer=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# App Info
spring.application.name=Smart Resume Analyzer
